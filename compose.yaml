name: ${COMPOSE_PROJECT_NAME:-tourtect}

services:
  postgres:
    image: docker.io/postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tourtect}
      POSTGRES_USER: ${POSTGRES_USER:-tourtect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7.2.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2024-05-10T01-41-38Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tourtect}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opensearch:
    image: docker.io/opensearchproject/opensearch:2.12.0
    profiles:
      - search
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:9200/_cluster/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    ulimits:
      memlock:
        soft: -1
        hard: -1
    restart: unless-stopped

  api:
    profiles: [app]
    build:
      context: ./backend
      dockerfile: Containerfile
    image: localhost/tourtect-backend:${TOURTECT_IMAGE_TAG:-local}
    command: ["tourtect-start-api"]
    environment:
      PORT: "8080"
      POSTGRES_DB: ${POSTGRES_DB:-tourtect}
      POSTGRES_USER: ${POSTGRES_USER:-tourtect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      TOURTECT_SEED_DEMO: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tourtect}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      FPT_AI_BASE_URL: ${FPT_AI_BASE_URL:-https://mkp-api.fptcloud.com}
      FPT_AI_API_KEY: ${FPT_AI_API_KEY}
      FPT_AI_TEXT_MODEL: ${FPT_AI_TEXT_MODEL}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  realtime:
    profiles: [realtime]
    image: localhost/tourtect-backend:${TOURTECT_IMAGE_TAG:-local}
    command: ["tourtect-realtime"]
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://${POSTGRES_USER:-tourtect}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-tourtect}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      FPT_AI_BASE_URL: ${FPT_AI_BASE_URL:-https://mkp-api.fptcloud.com}
      FPT_AI_API_KEY: ${FPT_AI_API_KEY}
      FPT_AI_TEXT_MODEL: ${FPT_AI_TEXT_MODEL}
    ports:
      - "127.0.0.1:${REALTIME_PORT:-8081}:8081"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    profiles: [worker]
    image: localhost/tourtect-backend:${TOURTECT_IMAGE_TAG:-local}
    command: ["tourtect-worker"]
    environment:
      PORT: "8082"
      DATABASE_URL: postgres://${POSTGRES_USER:-tourtect}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-tourtect}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      FPT_AI_BASE_URL: ${FPT_AI_BASE_URL:-https://mkp-api.fptcloud.com}
      FPT_AI_API_KEY: ${FPT_AI_API_KEY}
      FPT_AI_TEXT_MODEL: ${FPT_AI_TEXT_MODEL}
    ports:
      - "127.0.0.1:${WORKER_PORT:-8082}:8082"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    profiles: [app]
    build:
      context: ./web
      dockerfile: Containerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    image: localhost/tourtect-web:${TOURTECT_IMAGE_TAG:-local}
    environment:
      API_URL: http://api:8080
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      HOSTNAME: 0.0.0.0
      PORT: "80"
    ports:
      - "0.0.0.0:${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
    name: tourtect-postgres-data
  redis-data:
    name: tourtect-redis-data
  minio-data:
    name: tourtect-minio-data
  opensearch-data:
    name: tourtect-opensearch-data
