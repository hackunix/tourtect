openapi: "3.0.3"
info:
  title: Tourtect API
  version: "1.0.0"
  description: |
    Tourtect backend API — community-powered travel safety and price transparency platform.
    All responses use snake_case JSON. Times are ISO 8601 UTC.

servers:
  - url: http://localhost:8080
    description: Local development

paths:
  /health/live:
    get:
      operationId: healthLive
      tags: [health]
      summary: Liveness probe
      description: Returns 200 if the process is running.
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health/ready:
    get:
      operationId: healthReady
      tags: [health]
      summary: Readiness probe
      description: Returns 200 only when mandatory dependencies (PostgreSQL) are usable.
      responses:
        "200":
          description: All mandatory dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: One or more mandatory dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/places:
    get:
      operationId: listPlaces
      tags: [places]
      summary: List places
      description: Returns a paginated list of places with optional text, region, and category filters.
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/LocaleParam"
        - $ref: "#/components/parameters/RequestIdParam"
        - name: q
          in: query
          description: Free-text search query
          schema:
            type: string
        - name: region_id
          in: query
          description: Filter by region identifier
          schema:
            type: string
        - name: category
          in: query
          description: Filter by place category
          schema:
            type: string
        - name: lat
          in: query
          description: Latitude for distance search
          schema:
            type: number
            format: double
        - name: lon
          in: query
          description: Longitude for distance search
          schema:
            type: number
            format: double
        - name: radius_m
          in: query
          description: Search radius in meters (requires lat/lon)
          schema:
            type: integer
            default: 5000
      responses:
        "200":
          description: Paginated list of place summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/places/{placeId}:
    get:
      operationId: getPlace
      tags: [places]
      summary: Get place details
      parameters:
        - $ref: "#/components/parameters/PlaceIdParam"
        - $ref: "#/components/parameters/LocaleParam"
        - $ref: "#/components/parameters/RequestIdParam"
      responses:
        "200":
          description: Place details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/feed:
    get:
      operationId: getFeed
      tags: [community]
      summary: Get an explainable organic community feed
      parameters:
        - { name: mode, in: query, required: true, schema: { type: string, enum: [following, nearby, latest, trending, safety] } }
        - { name: region_id, in: query, schema: { type: string } }
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/RequestIdParam"
      responses:
        "200": { description: Explainable feed, content: { application/json: { schema: { $ref: "#/components/schemas/FeedResponse" } } } }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /v1/search:
    get:
      operationId: searchCommunity
      tags: [community]
      summary: Search public places and community content
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 2 } }
        - { name: tab, in: query, schema: { type: string, enum: [top, places, posts, price_reports, safety], default: top } }
        - $ref: "#/components/parameters/RequestIdParam"
      responses:
        "200": { description: Search results, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResponse" } } } }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }

  /v1/posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List published posts
      parameters:
        - $ref: "#/components/parameters/CursorParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/LocaleParam"
        - $ref: "#/components/parameters/RequestIdParam"
        - name: place_id
          in: query
          description: Filter by linked place
          schema:
            type: string
            format: uuid
        - name: post_type
          in: query
          description: Filter by post type
          schema:
            $ref: "#/components/schemas/PostType"
      responses:
        "200":
          description: Paginated list of posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/posts/drafts:
    post:
      operationId: createDraft
      tags: [posts]
      summary: Create a draft post
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "201":
          description: Draft created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/posts/{postId}/publish:
    post:
      operationId: publishPost
      tags: [posts]
      summary: Publish a draft post
      parameters:
        - $ref: "#/components/parameters/PostIdParam"
        - $ref: "#/components/parameters/RequestIdParam"
      responses:
        "200":
          description: Post published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Post is not in draft state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/LimitParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses:
        "200": { description: Flat comment thread with parent identifiers, content: { application/json: { schema: { $ref: "#/components/schemas/CommentListResponse" } } } }
    post:
      operationId: createComment
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateCommentRequest" } } } }
      responses:
        "201": { description: Comment created, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }

  /v1/posts/{postId}/votes/useful:
    put:
      operationId: markPostUseful
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Useful state set } }
    delete:
      operationId: unmarkPostUseful
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Useful state cleared } }

  /v1/saved:
    get:
      operationId: listSavedPosts
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Saved public posts, content: { application/json: { schema: { $ref: "#/components/schemas/PostListResponse" } } } } }

  /v1/saved/posts/{postId}:
    put:
      operationId: savePost
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Post saved } }
    delete:
      operationId: unsavePost
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Post removed from saved list } }

  /v1/notifications:
    get:
      operationId: listNotifications
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/LimitParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      responses: { "200": { description: Notifications, content: { application/json: { schema: { $ref: "#/components/schemas/NotificationListResponse" } } } } }
    patch:
      operationId: updateNotifications
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/RequestIdParam" } ]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [notification_ids, read], properties: { notification_ids: { type: array, items: { type: string, format: uuid } }, read: { type: boolean } } } } } }
      responses: { "200": { description: Notification states updated } }

  /v1/follows:
    post:
      operationId: createFollow
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/RequestIdParam" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FollowRequest" } } } }
      responses: { "200": { description: Follow created idempotently } }
    delete:
      operationId: deleteFollow
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/RequestIdParam" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/FollowRequest" } } } }
      responses: { "200": { description: Follow removed idempotently } }

  /v1/posts/{postId}/reports:
    post:
      operationId: reportPost
      tags: [community]
      parameters: [ { $ref: "#/components/parameters/PostIdParam" }, { $ref: "#/components/parameters/RequestIdParam" } ]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [reason], properties: { reason: { type: string, enum: [safety, pii, harassment, spam, misinformation, other] }, details: { type: string } } } } } }
      responses: { "201": { description: Report queued for moderation } }

  /v1/blocks/{principalId}:
    parameters: [ { name: principalId, in: path, required: true, schema: { type: string, format: uuid } }, { $ref: "#/components/parameters/RequestIdParam" } ]
    put:
      operationId: blockPrincipal
      tags: [community]
      responses: { "200": { description: Principal blocked idempotently } }
    delete:
      operationId: unblockPrincipal
      tags: [community]
      responses: { "200": { description: Principal unblocked idempotently } }

  /v1/price-checks:
    post:
      operationId: createPriceCheck
      tags: [pricing]
      summary: Submit a price check
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceCheckRequest"
      responses:
        "200":
          description: Price insight result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceInsight"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/safety/assessments:
    post:
      operationId: createSafetyAssessment
      tags: [safety]
      summary: Submit a safety assessment request
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafetyAssessmentRequest"
      responses:
        "200":
          description: Safety assessment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafetyAssessment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/assistant/sessions:
    post:
      operationId: createAssistantSession
      tags: [assistant]
      summary: Create an assistance session
      parameters:
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssistantSessionRequest"
      responses:
        "201":
          description: Versioned, short-lived assistance session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantSession"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "503":
          description: Session storage unavailable
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /v1/assistant/sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/AssistantSessionIdParam"
      - $ref: "#/components/parameters/RequestIdParam"
    get:
      operationId: getAssistantSession
      tags: [assistant]
      summary: Resume an owned assistance session
      responses:
        "200":
          description: Current redacted session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantSession"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAssistantSession
      tags: [assistant]
      summary: End and remove an assistance session
      responses:
        "204":
          description: Session state removed
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/assistant/sessions/{sessionId}/messages:
    post:
      operationId: createAssistantMessage
      tags: [assistant]
      summary: Send a typed input through the Tourtect Intelligence Layer
      parameters:
        - $ref: "#/components/parameters/AssistantSessionIdParam"
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantMessageRequest"
      responses:
        "200":
          description: Evidence-backed structured assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate message identifier or stale session state
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/assistant/sessions/{sessionId}/confirmations:
    post:
      operationId: confirmAssistantAction
      tags: [assistant]
      summary: Confirm or reject a server-issued consequential action
      parameters:
        - $ref: "#/components/parameters/AssistantSessionIdParam"
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantConfirmationRequest"
      responses:
        "200":
          description: Confirmation outcome
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantConfirmationResult"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Confirmation expired, already consumed, or state changed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /v1/assistant/sessions/{sessionId}/feedback:
    post:
      operationId: createAssistantFeedback
      tags: [assistant]
      summary: Quarantine explicit assistant feedback or a user correction
      parameters:
        - $ref: "#/components/parameters/AssistantSessionIdParam"
        - $ref: "#/components/parameters/RequestIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantFeedbackRequest"
      responses:
        "202":
          description: Feedback quarantined for validation or moderation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantFeedbackReceipt"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

components:
  parameters:
    CursorParam:
      name: cursor
      in: query
      description: Opaque cursor for pagination
      schema:
        type: string

    LimitParam:
      name: limit
      in: query
      description: Maximum number of items to return
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    LocaleParam:
      name: locale
      in: query
      description: Preferred locale for responses
      schema:
        $ref: "#/components/schemas/Locale"

    RequestIdParam:
      name: X-Request-ID
      in: header
      description: Client-provided request identifier for tracing
      schema:
        type: string
        format: uuid

    PlaceIdParam:
      name: placeId
      in: path
      required: true
      description: Place identifier
      schema:
        type: string
        format: uuid

    PostIdParam:
      name: postId
      in: path
      required: true
      description: Post identifier
      schema:
        type: string
        format: uuid

    AssistantSessionIdParam:
      name: sessionId
      in: path
      required: true
      description: Opaque assistance-session identifier
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    UnprocessableEntity:
      description: Request body validation failed
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    InternalError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  schemas:
    Locale:
      type: string
      enum: [vi-VN, ko-KR, zh-Hans, en, ru-RU]

    PostType:
      type: string
      enum:
        - discussion
        - question
        - review
        - price_report
        - scam_report
        - tip
        - official_alert
        - external_link

    ModerationStatus:
      type: string
      enum: [draft, pending, published, limited, removed, appealed]

    EvidenceLevel:
      type: string
      enum: [none, metadata, verified_receipt, verified_source]

    CommercialDisclosure:
      type: string
      enum: [none, invited, gifted, affiliate, employee, sponsored]

    AlertLevel:
      type: string
      enum: [typical, elevated, high_risk, insufficient_data]

    Vertical:
      type: string
      enum: [taxi, exchange, food, tour, street_retail]

    ServiceSegment:
      type: string
      enum: [budget, standard, premium, luxury, regulated]

    VenueType:
      type: string
      enum:
        - fixed_shop
        - casual_eatery
        - street_stall
        - mobile_vendor
        - market_stall
        - attraction_concession
        - transport_vendor
        - peer_to_peer

    TransactionContext:
      type: string
      enum:
        - posted_price
        - verbal_quote
        - negotiated
        - metered
        - platform_booked
        - unsolicited_goods_service
        - donation_solicitation

    SafetyUrgency:
      type: string
      enum: [critical, urgent, non_emergency, information]

    GeoFallbackLevel:
      type: string
      enum: [exact_zone, commune, province, province_cluster, national_vertical]

    ProblemDetail:
      type: object
      required: [type, status, title]
      properties:
        type:
          type: string
          description: URI reference identifying the problem type
        status:
          type: integer
          description: HTTP status code
        title:
          type: string
          description: Short human-readable summary
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          description: URI reference for this specific occurrence
        trace_id:
          type: string
          description: Request trace identifier

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
        checks:
          type: object
          additionalProperties:
            type: string
        timestamp:
          type: string
          format: date-time

    CursorInfo:
      type: object
      properties:
        next_cursor:
          type: string
          description: Cursor for the next page, absent if no more results
        has_more:
          type: boolean

    Coordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    PlaceSummary:
      type: object
      required: [place_id, name, category, coordinates, created_at]
      properties:
        place_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        region_id:
          type: string
        coordinates:
          $ref: "#/components/schemas/Coordinates"
        address:
          type: string
        aliases:
          type: array
          items:
            type: string
        post_count:
          type: integer
        average_rating:
          type: number
          format: double
        freshness:
          type: string
          format: date-time
          description: Last content update time
        created_at:
          type: string
          format: date-time
        distance_m:
          type: number
          format: double
          description: Distance from search point in meters, present only for geo queries

    PlaceDetail:
      type: object
      required: [place_id, name, category, coordinates, created_at]
      properties:
        place_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        region_id:
          type: string
        coordinates:
          $ref: "#/components/schemas/Coordinates"
        address:
          type: string
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
        phone:
          type: string
        website:
          type: string
        opening_hours:
          type: string
        post_count:
          type: integer
        review_count:
          type: integer
        average_rating:
          type: number
          format: double
        freshness:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PlaceListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PlaceSummary"
        pagination:
          $ref: "#/components/schemas/CursorInfo"

    Post:
      type: object
      required:
        - post_id
        - author_id
        - post_type
        - original_locale
        - title
        - body
        - moderation_status
        - evidence_level
        - commercial_disclosure
        - created_at
        - updated_at
      properties:
        post_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        post_type:
          $ref: "#/components/schemas/PostType"
        original_locale:
          $ref: "#/components/schemas/Locale"
        title:
          type: string
        body:
          type: string
        region_id:
          type: string
        structured_data:
          type: object
          additionalProperties: true
        place_ids:
          type: array
          items:
            type: string
            format: uuid
        evidence_level:
          $ref: "#/components/schemas/EvidenceLevel"
        commercial_disclosure:
          $ref: "#/components/schemas/CommercialDisclosure"
        moderation_status:
          $ref: "#/components/schemas/ModerationStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/AuthorSummary"
        places:
          type: array
          items: { $ref: "#/components/schemas/PlaceAttachment" }
        useful_count: { type: integer, minimum: 0 }
        comment_count: { type: integer, minimum: 0 }
        viewer_useful: { type: boolean }
        viewer_saved: { type: boolean }
        reason_codes:
          type: array
          items: { type: string }

    CreateDraftRequest:
      type: object
      required: [post_type, original_locale, title, body]
      properties:
        post_type:
          $ref: "#/components/schemas/PostType"
        original_locale:
          $ref: "#/components/schemas/Locale"
        title:
          type: string
          minLength: 1
          maxLength: 500
        body:
          type: string
          minLength: 1
          maxLength: 50000
        region_id:
          type: string
        structured_data:
          type: object
          description: Type-specific draft fields validated and persisted by the community domain.
          additionalProperties: true
        place_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 10

    PostListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Post"
        pagination:
          $ref: "#/components/schemas/CursorInfo"

    AuthorSummary:
      type: object
      required: [principal_id, display_name]
      properties:
        principal_id: { type: string, format: uuid }
        display_name: { type: string }

    PlaceAttachment:
      type: object
      required: [place_id, name, category, region_id, freshness]
      properties:
        place_id: { type: string, format: uuid }
        name: { type: string }
        category: { type: string }
        region_id: { type: string }
        freshness: { type: string, format: date-time }

    FeedResponse:
      type: object
      required: [items, pagination]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Post" } }
        pagination: { $ref: "#/components/schemas/CursorInfo" }

    SearchResponse:
      type: object
      required: [query, tab, places, posts]
      properties:
        query: { type: string }
        tab: { type: string }
        places: { type: array, items: { $ref: "#/components/schemas/PlaceSummary" } }
        posts: { type: array, items: { $ref: "#/components/schemas/Post" } }

    Comment:
      type: object
      required: [comment_id, post_id, body, moderation_status, created_at, updated_at]
      properties:
        comment_id: { type: string, format: uuid }
        post_id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/AuthorSummary" }
        parent_comment_id: { type: string, format: uuid }
        body: { type: string }
        moderation_status: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 10000 }
        parent_comment_id: { type: string, format: uuid }

    CommentListResponse:
      type: object
      required: [items, pagination]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Comment" } }
        pagination: { $ref: "#/components/schemas/CursorInfo" }

    Notification:
      type: object
      required: [notification_id, kind, message, created_at]
      properties:
        notification_id: { type: string, format: uuid }
        kind: { type: string }
        actor_id: { type: string, format: uuid }
        post_id: { type: string, format: uuid }
        comment_id: { type: string, format: uuid }
        message: { type: string }
        read_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    NotificationListResponse:
      type: object
      required: [items, pagination]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Notification" } }
        pagination: { $ref: "#/components/schemas/CursorInfo" }

    FollowRequest:
      type: object
      required: [target_type, target_id]
      properties:
        target_type: { type: string, enum: [principal, place] }
        target_id: { type: string, format: uuid }

    Money:
      type: object
      required: [amount_minor, currency, exponent]
      properties:
        amount_minor:
          type: string
          description: Amount in minor units as string to avoid floating-point issues
        currency:
          type: string
          minLength: 3
          maxLength: 3
        exponent:
          type: integer

    PriceCheckRequest:
      type: object
      required: [vertical, raw_item, money, unit, region_id, service_segment, venue_type, transaction_context, observed_at]
      properties:
        vertical:
          $ref: "#/components/schemas/Vertical"
        canonical_item_id:
          type: string
        raw_item:
          type: string
        money:
          $ref: "#/components/schemas/Money"
        unit:
          type: string
        region_id:
          type: string
        pricing_zone_id:
          type: string
        service_segment:
          $ref: "#/components/schemas/ServiceSegment"
        venue_type:
          $ref: "#/components/schemas/VenueType"
        transaction_context:
          $ref: "#/components/schemas/TransactionContext"
        observed_at:
          type: string
          format: date-time
        extraction_confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        user_confirmed:
          type: boolean
          default: false

    PriceInsight:
      type: object
      required: [alert_level, observed, confidence, freshness, dataset_version, trace_id, reasons]
      properties:
        alert_level:
          $ref: "#/components/schemas/AlertLevel"
        observed:
          $ref: "#/components/schemas/Money"
        reference:
          $ref: "#/components/schemas/PriceReference"
        deviation_ratio:
          type: number
          format: double
        confidence:
          type: number
          format: double
        comparison_scope:
          type: string
        freshness:
          type: string
          format: date-time
        sample_size:
          type: integer
        snapshot_version:
          type: string
        reasons:
          type: array
          items:
            type: string
        possible_benign_explanations:
          type: array
          items:
            type: string
        dataset_version:
          type: string
        trace_id:
          type: string

    PriceReference:
      type: object
      properties:
        p10_minor:
          type: string
        p50_minor:
          type: string
        p90_minor:
          type: string
        currency:
          type: string
        exponent:
          type: integer
        unit:
          type: string
        region_id:
          type: string
        pricing_zone_id:
          type: string
        service_segment:
          $ref: "#/components/schemas/ServiceSegment"
        venue_type:
          $ref: "#/components/schemas/VenueType"
        geo_fallback_level:
          $ref: "#/components/schemas/GeoFallbackLevel"
        effective_sample_size:
          type: integer
        independent_source_count:
          type: integer

    SafetyAssessmentRequest:
      type: object
      required: [observed_facts]
      properties:
        observed_facts:
          type: array
          items:
            type: string
          minItems: 1
        user_reported_state:
          type: string
        threat_indicators:
          type: array
          items:
            type: string
        injury_indicators:
          type: array
          items:
            type: string
        confinement_indicators:
          type: array
          items:
            type: string
        coercion_indicators:
          type: array
          items:
            type: string
        ability_to_leave:
          type: boolean
        user_confirmed_facts:
          type: array
          items:
            type: string
        region_id:
          type: string
          description: Explicit region for versioned safety-directory lookup; omission disables regional hotline lookup.

    SafetyAssessment:
      type: object
      required: [urgency, safe_actions, safety_directory_version, confidence, trace_id]
      properties:
        urgency:
          $ref: "#/components/schemas/SafetyUrgency"
        safe_actions:
          type: array
          items:
            type: string
        approved_action_codes:
          type: array
          items:
            type: string
        explanation_codes:
          type: array
          items:
            type: string
        silent_mode_recommended:
          type: boolean
        surface_emergency_options:
          type: boolean
        emergency_service_ids:
          type: array
          items:
            type: string
        safety_directory_version:
          type: string
        confidence:
          type: number
          format: double
        trace_id:
          type: string

    AssistantIntent:
      type: string
      enum:
        - general_travel_question
        - place_discovery
        - place_information
        - price_check
        - price_explanation
        - translation
        - live_translation
        - menu_or_receipt_analysis
        - scam_pattern_assessment
        - safety_assessment
        - emergency_help
        - community_search
        - create_report_draft
        - unknown

    AssistantInputType:
      type: string
      enum: [text, voice_transcript, image_capture, structured_price_candidate, structured_safety_facts]

    AssistantSafetyState:
      type: string
      enum: [critical, urgent, non_emergency, information, unknown]

    CreateAssistantSessionRequest:
      type: object
      required: [locale]
      properties:
        locale:
          type: string
        target_locale:
          type: string
        place_id:
          type: string
          format: uuid
        approximate_region:
          type: string
        interaction_mode:
          type: string
          enum: [text, voice, lens, mixed]
        processing_consent:
          type: boolean
          default: false

    AssistantSessionContext:
      type: object
      required: [locale, interaction_mode, consent_state]
      properties:
        locale:
          type: string
        target_locale:
          type: string
        place_id:
          type: string
          format: uuid
        approximate_region:
          type: string
        interaction_mode:
          type: string
        current_safety_state:
          $ref: "#/components/schemas/AssistantSafetyState"
        user_confirmed_facts:
          type: array
          items:
            type: string
          maxItems: 32
        active_capture_ids:
          type: array
          items:
            type: string
            format: uuid
          maxItems: 8
        consent_state:
          type: object
          required: [processing, contribution, publish]
          properties:
            processing:
              type: boolean
            contribution:
              type: boolean
            publish:
              type: boolean

    AssistantSession:
      type: object
      required: [session_id, version, created_at, updated_at, expires_at, context]
      properties:
        session_id:
          type: string
          format: uuid
        version:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        context:
          $ref: "#/components/schemas/AssistantSessionContext"
        recent_responses:
          type: array
          items:
            $ref: "#/components/schemas/AssistantResponse"
          maxItems: 20

    AssistantMessageRequest:
      type: object
      required: [message_id, input_type]
      properties:
        message_id:
          type: string
          format: uuid
        input_type:
          $ref: "#/components/schemas/AssistantInputType"
        text:
          type: string
          maxLength: 8000
        locale:
          type: string
        place_id:
          type: string
          format: uuid
        capture_id:
          type: string
          format: uuid
        user_confirmed:
          type: boolean
          default: false
        structured_data:
          type: object
          additionalProperties: true

    AssistantEvidence:
      type: object
      required: [evidence_id, source_type, source_id, title, summary, freshness, evidence_level]
      properties:
        evidence_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum: [official_source, community_post, verified_price_observation, price_snapshot, safety_directory, scam_pattern, place_record, session_fact]
        source_id:
          type: string
        title:
          type: string
        summary:
          type: string
        observed_at:
          type: string
          format: date-time
        freshness:
          type: string
          enum: [fresh, aging, stale, unknown]
        evidence_level:
          type: string
          enum: [official, verified, community, session_confirmed]
        source_url:
          type: string
          format: uri

    AssistantToolResult:
      type: object
      required: [tool_result_id, tool_name, status, duration_ms, output]
      properties:
        tool_result_id:
          type: string
          format: uuid
        tool_name:
          type: string
        status:
          type: string
          enum: [succeeded, insufficient_data, degraded, failed]
        duration_ms:
          type: integer
          format: int64
        output:
          type: object
          additionalProperties: true
        error_category:
          type: string

    AssistantConfirmation:
      type: object
      required: [confirmation_id, action, title, description, expires_at]
      properties:
        confirmation_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [create_report_draft, publish_report, upload_evidence, save_transcript, share_location, open_dialer, contact_trusted_person, contribute_observation]
        title:
          type: string
        description:
          type: string
        expires_at:
          type: string
          format: date-time

    AssistantSuggestedAction:
      type: object
      required: [action_id, label, action_type, requires_confirmation]
      properties:
        action_id:
          type: string
        label:
          type: string
        action_type:
          type: string
          enum: [clarify, deep_link, confirmation, manual_price_check, manual_safety_assessment, offline_directory, save_private_draft]
        target:
          type: string
        requires_confirmation:
          type: boolean

    AssistantResponse:
      type: object
      required: [assistant_message_id, intent, message, confidence, evidence, tool_results, suggested_actions, safety_state, factors_considered, missing_information, fallback_used, trace_id]
      properties:
        assistant_message_id:
          type: string
          format: uuid
        intent:
          $ref: "#/components/schemas/AssistantIntent"
        message:
          type: string
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/AssistantEvidence"
        tool_results:
          type: array
          items:
            $ref: "#/components/schemas/AssistantToolResult"
        requested_confirmation:
          $ref: "#/components/schemas/AssistantConfirmation"
        suggested_actions:
          type: array
          items:
            $ref: "#/components/schemas/AssistantSuggestedAction"
        safety_state:
          $ref: "#/components/schemas/AssistantSafetyState"
        factors_considered:
          type: array
          items:
            type: string
        missing_information:
          type: array
          items:
            type: string
        freshness:
          type: string
        dataset_version:
          type: string
        fallback_used:
          type: boolean
        trace_id:
          type: string

    AssistantConfirmationRequest:
      type: object
      required: [confirmation_id, decision]
      properties:
        confirmation_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [confirmed, rejected]

    AssistantConfirmationResult:
      type: object
      required: [confirmation_id, action, status, executed_at]
      properties:
        confirmation_id:
          type: string
          format: uuid
        action:
          type: string
        status:
          type: string
          enum: [confirmed, rejected]
        executed_at:
          type: string
          format: date-time
        result_id:
          type: string
          format: uuid
        target:
          type: string
          description: Server-verified client target, returned only after confirmation

    AssistantFeedbackRequest:
      type: object
      required: [assistant_message_id, feedback_type]
      properties:
        assistant_message_id:
          type: string
          format: uuid
        feedback_type:
          type: string
          enum: [helpful, not_helpful, correction, translation_incorrect, false_positive, confirm_extraction, contribute_redacted_observation]
        field:
          type: string
        original_value:
          type: string
        corrected_value:
          type: string
        consent_to_contribute:
          type: boolean
          default: false

    AssistantFeedbackReceipt:
      type: object
      required: [feedback_id, status, created_at]
      properties:
        feedback_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [quarantined]
        created_at:
          type: string
          format: date-time
